name: Feature Request
description: Suggest a new feature for Synthea Studio
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide details below.
  
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Clear description of the feature you'd like
      placeholder: I would like to be able to export populations directly to a FHIR server...
    validations:
      required: true
  
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Describe the problem this feature would solve
      placeholder: Currently, I have to manually download and upload populations...
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered
  
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Critical
    validations:
      required: true
  
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to help implement this feature
          required: false