<!DOCTYPE html>
<html>
<head>
    <title>Verify Module Federation</title>
</head>
<body>
    <h1>Module Federation Verification</h1>
    <div id="status"></div>

    <script>
        const statusDiv = document.getElementById('status');

        async function verifyFederation() {
            try {
                // Step 1: Check if proxy endpoint is accessible
                const proxyResponse = await fetch('http://localhost:3001/syntheaCore/remoteEntry.js');
                if (proxyResponse.ok) {
                    statusDiv.innerHTML += '<p>✅ Proxy endpoint is accessible</p>';
                } else {
                    statusDiv.innerHTML += '<p>❌ Proxy endpoint returned: ' + proxyResponse.status + '</p>';
                    return;
                }

                // Step 2: Load the script
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'http://localhost:3001/syntheaCore/remoteEntry.js';
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
                statusDiv.innerHTML += '<p>✅ Remote entry script loaded</p>';

                // Step 3: Check if container is available
                if (window.syntheaCore) {
                    statusDiv.innerHTML += '<p>✅ syntheaCore container is available</p>';

                    // Step 4: Initialize the container
                    await window.syntheaCore.init();
                    statusDiv.innerHTML += '<p>✅ Container initialized</p>';

                    // Step 5: Load the module
                    const factory = await window.syntheaCore.get('./SyntheaStudio');
                    const module = factory();
                    statusDiv.innerHTML += '<p>✅ Module loaded successfully</p>';
                    statusDiv.innerHTML += '<p>Exported items: ' + Object.keys(module).join(', ') + '</p>';

                    statusDiv.innerHTML += '<h2 style="color: green;">✅ Module Federation is working correctly!</h2>';
                } else {
                    statusDiv.innerHTML += '<p>❌ syntheaCore container not found on window</p>';
                }
            } catch (error) {
                statusDiv.innerHTML += '<p>❌ Error: ' + error.message + '</p>';
                console.error('Verification failed:', error);
            }
        }

        // Run verification
        verifyFederation();
    </script>
</body>
</html>
