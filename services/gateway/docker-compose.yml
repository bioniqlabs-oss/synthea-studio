version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synthea-gateway
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=api-gateway
      - SERVICE_PORT=8000
      - FHIR_SERVICE_URL=http://fhir:8002
      - WORKER_SERVICE_URL=http://worker:8003
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/synthea_studio
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
      - AUTH_ENABLED=false
      - RATE_LIMIT_ENABLED=true
      - CACHE_ENABLED=true
      - SERVICE_DISCOVERY_ENABLED=true
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app:ro
    depends_on:
      - postgres
      - redis
    networks:
      - synthea_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: synthea-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=synthea_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - synthea_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: synthea-redis
    networks:
      - synthea_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  synthea_network:
    driver: bridge