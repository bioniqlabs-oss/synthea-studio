version: '3.8'

services:
  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    container_name: synthea-worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/synthea_studio
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SYNTHEA_JAR_PATH=/opt/synthea/synthea.jar
      - STORAGE_PATH=/data/synthea
      - WORKER_CONCURRENCY=4
      - WORKER_LOG_LEVEL=INFO
    volumes:
      - synthea_data:/data/synthea
      - ../../packages/shared:/app/packages/shared:ro
      - ./app:/app/app:ro
    depends_on:
      - postgres
      - redis
    networks:
      - synthea_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: synthea-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=synthea_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - synthea_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: synthea-redis
    ports:
      - "6379:6379"
    networks:
      - synthea_network
    restart: unless-stopped

volumes:
  postgres_data:
  synthea_data:

networks:
  synthea_network:
    driver: bridge