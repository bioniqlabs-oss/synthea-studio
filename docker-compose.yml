services:
  # Backend API Service
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: synthea-backend
    ports:
      - "8001:8001"  # Backend API port
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@synthea-postgres:5432/synthea_studio
      - REDIS_URL=redis://synthea-redis:6379/0
      - CELERY_BROKER_URL=redis://synthea-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://synthea-redis:6379/0
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      - postgres
      - redis
    networks:
      - synthea_network

  # Celery worker for background tasks
  celery:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: synthea-celery
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@synthea-postgres:5432/synthea_studio
      - REDIS_URL=redis://synthea-redis:6379/0
      - CELERY_BROKER_URL=redis://synthea-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://synthea-redis:6379/0
    volumes:
      - ./backend:/app
      - ./storage:/storage
      - ./synthea:/synthea
    depends_on:
      - postgres
      - redis
    networks:
      - synthea_network

  # Frontend
  frontend:
    image: node:18-alpine
    container_name: synthea-frontend
    working_dir: /app
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:8001
      - VITE_WS_URL=ws://localhost:8001
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend
    networks:
      - synthea_network

  # PostgreSQL
  postgres:
    image: postgres:14-alpine
    container_name: synthea-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=synthea_studio
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - synthea_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: synthea-redis
    ports:
      - "6383:6379"
    networks:
      - synthea_network

volumes:
  postgres_data:

networks:
  synthea_network:
    driver: bridge