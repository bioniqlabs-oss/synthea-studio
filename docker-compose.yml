version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: synthea-studio-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: synthea_studio
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: synthea-studio-redis
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synthea-studio-backend
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@postgres:5432/synthea_studio
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_PATH: /var/lib/synthea-studio/storage
      SYNTHEA_JAR_PATH: /app/synthea/synthea-with-dependencies.jar
      SYNTHEA_OUTPUT_PATH: /tmp/synthea-output
    ports:
      - "8001:8001"
    volumes:
      - storage_data:/var/lib/synthea-studio/storage
      - synthea_output:/tmp/synthea-output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped

  # Synthea Core Module (Micro-frontend)
  synthea-core:
    build:
      context: ./packages/core
      dockerfile: Dockerfile
    container_name: synthea-studio-core
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3002
      REACT_APP_API_URL: ${API_URL:-http://localhost:8001}
      PUBLIC_PATH: ${CORE_PUBLIC_PATH:-http://localhost:3002/}
    ports:
      - "3002:3002"
    volumes:
      - ./packages/core:/app:delegated
      - /app/node_modules
    restart: unless-stopped

  # Synthea Shell (Standalone App)
  synthea-shell:
    build:
      context: ./packages/shell
      dockerfile: Dockerfile
    container_name: synthea-studio-shell
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      SYNTHEA_CORE_URL: ${SYNTHEA_CORE_URL:-http://localhost:3002/remoteEntry.js}
    ports:
      - "3001:3001"
    depends_on:
      - synthea-core
      - backend
    volumes:
      - ./packages/shell:/app:delegated
      - /app/node_modules
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synthea-studio-celery
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@postgres:5432/synthea_studio
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_PATH: /var/lib/synthea-studio/storage
      SYNTHEA_JAR_PATH: /app/synthea/synthea-with-dependencies.jar
      SYNTHEA_OUTPUT_PATH: /tmp/synthea-output
    volumes:
      - storage_data:/var/lib/synthea-studio/storage
      - synthea_output:/tmp/synthea-output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.generation_worker worker --loglevel=info
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.generation_worker", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Optional: MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: synthea-studio-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    profiles:
      - storage
    restart: unless-stopped

volumes:
  postgres_data:
  storage_data:
  synthea_output:
  minio_data: