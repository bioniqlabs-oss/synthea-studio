<!DOCTYPE html>
<html>
<head>
    <title>Direct Module Federation Test</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
    <h1>Direct Module Federation Test</h1>
    <div id="root"></div>
    <div id="status"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const rootDiv = document.getElementById('root');

        async function loadTestComponent() {
            try {
                statusDiv.innerHTML = '<p>Loading remoteEntry.js...</p>';

                // Load the remote entry script
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'http://localhost:3002/remoteEntry.js';
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });

                statusDiv.innerHTML += '<p>✅ remoteEntry.js loaded</p>';

                // Check if container exists
                if (typeof syntheaCore === 'undefined') {
                    throw new Error('syntheaCore container not found');
                }

                statusDiv.innerHTML += '<p>✅ syntheaCore container found</p>';

                // Initialize the container with shared dependencies
                await syntheaCore.init({
                    react: {
                        [React.version]: {
                            get: () => Promise.resolve(() => React)
                        }
                    },
                    'react-dom': {
                        [ReactDOM.version]: {
                            get: () => Promise.resolve(() => ReactDOM)
                        }
                    }
                });

                statusDiv.innerHTML += '<p>✅ Container initialized</p>';

                // Get the TestComponent factory
                const factory = await syntheaCore.get('./TestComponent');
                statusDiv.innerHTML += '<p>✅ Got TestComponent factory</p>';

                // Execute the factory to get the module
                const module = factory();
                statusDiv.innerHTML += '<p>✅ TestComponent module loaded</p>';

                // Get the component
                const TestComponent = module.default || module;

                // Render the component
                const element = React.createElement(TestComponent);
                ReactDOM.render(element, rootDiv);

                statusDiv.innerHTML += '<p>🎉 TestComponent rendered successfully!</p>';
            } catch (error) {
                statusDiv.innerHTML += `<p style="color: red;">❌ Error: ${error.message}</p>`;
                console.error('Full error:', error);
            }
        }

        // Run the test
        loadTestComponent();
    </script>
</body>
</html>
