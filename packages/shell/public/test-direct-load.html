<!DOCTYPE html>
<html>
<head>
    <title>Direct Module Federation Test</title>
</head>
<body>
    <h1>Direct Module Federation Test</h1>
    <div id="status"></div>
    <div id="root"></div>

    <script>
        const statusDiv = document.getElementById('status');

        // Directly load the remoteEntry.js via proxy
        const script = document.createElement('script');
        script.src = '/syntheaCore/remoteEntry.js';

        script.onload = async () => {
            statusDiv.innerHTML += '<p>✅ remoteEntry.js loaded via proxy</p>';

            if (window.syntheaCore) {
                statusDiv.innerHTML += '<p>✅ syntheaCore global available</p>';

                try {
                    // Initialize without any shared modules first
                    await window.syntheaCore.init();
                    statusDiv.innerHTML += '<p>✅ syntheaCore initialized</p>';

                    // Try to get available modules
                    statusDiv.innerHTML += '<p>Attempting to get module...</p>';
                    const factory = await window.syntheaCore.get('./SyntheaStudio');
                    statusDiv.innerHTML += '<p>✅ Got SyntheaStudio factory</p>';

                    const module = factory();
                    statusDiv.innerHTML += '<p>✅ Module loaded: ' + typeof module + '</p>';
                    statusDiv.innerHTML += '<p>Module keys: ' + Object.keys(module).join(', ') + '</p>';

                } catch (error) {
                    statusDiv.innerHTML += '<p>❌ Error: ' + error.message + '</p>';
                    statusDiv.innerHTML += '<p>Stack: <pre>' + error.stack + '</pre></p>';
                    console.error('Full error:', error);
                }
            } else {
                statusDiv.innerHTML += '<p>❌ syntheaCore not available on window</p>';
            }
        };

        script.onerror = (error) => {
            statusDiv.innerHTML += '<p>❌ Failed to load remoteEntry.js via proxy</p>';
            console.error('Script error:', error);
        };

        document.head.appendChild(script);
    </script>
</body>
</html>
