version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: synthea-studio-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synthea_studio
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: synthea-studio-redis
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synthea-studio-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/synthea_studio
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: local
      STORAGE_PATH: /var/lib/synthea-studio/storage
      SYNTHEA_JAR_PATH: /app/synthea/synthea-with-dependencies.jar
      SYNTHEA_OUTPUT_PATH: /tmp/synthea-output
    ports:
      - "8001:8001"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - storage_data:/var/lib/synthea-studio/storage
      - synthea_output:/tmp/synthea-output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # Synthea Core Module (Micro-frontend) - Development
  synthea-core:
    build:
      context: ./packages/core
      dockerfile: Dockerfile.dev
    container_name: synthea-studio-core-dev
    environment:
      NODE_ENV: development
      PORT: 3002
      REACT_APP_API_URL: http://localhost:8001
      PUBLIC_PATH: http://localhost:3002/
    ports:
      - "3002:3002"
    volumes:
      - ./packages/core:/app
      - /app/node_modules
    command: npm run dev

  # Synthea Shell (Standalone App) - Development
  synthea-shell:
    build:
      context: ./packages/shell
      dockerfile: Dockerfile.dev
    container_name: synthea-studio-shell-dev
    environment:
      NODE_ENV: development
      PORT: 3001
      SYNTHEA_CORE_URL: http://localhost:3002/remoteEntry.js
    ports:
      - "3001:3001"
    volumes:
      - ./packages/shell:/app
      - /app/node_modules
    depends_on:
      - synthea-core
      - backend
    command: npm run dev

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synthea-studio-celery
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/synthea_studio
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_PATH: /var/lib/synthea-studio/storage
      SYNTHEA_JAR_PATH: /app/synthea/synthea-with-dependencies.jar
      SYNTHEA_OUTPUT_PATH: /tmp/synthea-output
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - storage_data:/var/lib/synthea-studio/storage
      - synthea_output:/tmp/synthea-output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.generation_worker worker --loglevel=info
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.generation_worker", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: synthea-studio-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    profiles:
      - storage

volumes:
  postgres_data:
  storage_data:
  synthea_output:
  minio_data: